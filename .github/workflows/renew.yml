name: Auto Renew Game4Free Server

on:
  workflow_dispatch: # 允许在 GitHub 网页上手动点击运行 (测试用)
  schedule:
    # 定时任务：这里设置的是 UTC 时间。
    # 例如 0 */12 * * * 表示每 12 小时执行一次。
    # 你可以根据网站要求的续期 CD 修改，下面默认每天 UTC 0点和12点执行。
    - cron: '0 0,12 * * *'

jobs:
  renew_server:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # 安装 Playwright 对应的浏览器内核
        playwright install chromium

    - name: 执行续期脚本
      env:
        # 从 GitHub Secrets 中读取代理变量并传递给 Python 脚本
        SOCKS5_PROXY: ${{ secrets.SOCKS5_PROXY }}
      run: |
        python renew.py

    - name: 上传错误截图 (如果运行失败)
      uses: actions/upload-artifact@v4
      if: failure() # 只有失败时才执行此步
      with:
        name: error-screenshot
        path: error_screenshot.png
        retention-days: 3
