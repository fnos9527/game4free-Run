name: Server Auto Renew

on:
  schedule:
    # 每 1 个小时自动跑一次（因为每次加 90 分钟）
    - cron: '0 */1 * * *'
  workflow_dispatch: # 支持手动触发

jobs:
  renew:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/actions-setup-node@v4
      with:
        node-version: '18'

    - name: Install dependencies
      run: npm install axios

    - name: Run Renew Script
      env:
        # 把 Cookie 存在安全变量里，以后过期了只需要在 GitHub 网页上改，不用改代码
        MY_WEBSITE_COOKIE: ${{ secrets.MY_WEBSITE_COOKIE }}
      run: node renew.js
