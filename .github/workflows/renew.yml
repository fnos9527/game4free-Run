name: Auto Renew Game4Free Server

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  renew_server:
    runs-on: ubuntu-22.04

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 🛠️ 安装系统底层依赖 (虚拟显示器)
      run: |
        sudo apt-get update -q
        sudo apt-get install -y xvfb

    - name: 📥 下载最新版 Buster 免费 AI 破解插件
      run: |
        # 直接使用作者 GitHub 最新的 v3.1.2 版本官方 zip 包，绝对不会再失效
        wget -q "https://github.com/dessant/buster/releases/download/v3.1.2/buster_captcha_solver_for_humans-3.1.2-chrome.zip" -O buster.zip
        unzip -q buster.zip -d buster_ext
        echo "✅ Buster 插件下载并解压成功！"

    - name: 设置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 🐍 安装 Python 依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 🔧 安装 ChromeDriver 驱动
      run: seleniumbase install chromedriver

    - name: 🚀 执行续期脚本
      env:
        SOCKS5_PROXY: ${{ secrets.SOCKS5_PROXY }}
      run: |
        xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python renew.py

    - name: 📸 上传运行截图
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: run-screenshots
        path: "*.png"
        retention-days: 3
