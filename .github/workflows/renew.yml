name: Server Auto Renew

on:
  schedule:
    # 每 1 小时自动运行一次（每次成功续期 90 分钟）
    - cron: '0 */1 * * *'
  workflow_dispatch: # 支持手动点击运行

jobs:
  renew:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: 下载并配置 Xray 代理
      run: |
        echo "正在下载 Xray-core..."
        curl -L -H "User-Agent: Mozilla/5.0" -o xray.zip "https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip"
        unzip -q xray.zip
        chmod +x xray
        
        echo "正在启动 Xray 代理服务..."
        ./xray -c config.json > xray.log 2>&1 &
        
        echo "原地等待 3 秒等待代理建立连接..."
        sleep 3
        
        echo "检查 Xray 是否成功启动："
        ps aux | grep xray

    - name: 安装项目依赖 (Axios & Playwright)
      run: |
        # 强制清空一下可能残留的缓存，重新干净地安装
        npm install axios playwright
        # 用刚刚安装好的局部 npx 路径去装 chromium
        ./node_modules/.bin/playwright install chromium

    - name: 运行续期脚本 (通过虚拟桌面环境)
      env:
        MY_WEBSITE_COOKIE: ${{ secrets.MY_WEBSITE_COOKIE }}
        HTTP_PROXY: "socks5://127.0.0.1:10808"
        HTTPS_PROXY: "socks5://127.0.0.1:10808"
      run: |
        xvfb-run --auto-servernum --server-args="-screen 0 1366x768x24" node renew.js

    - name: 打印 Xray 运行日志 (可选-用于排查代理问题)
      if: always()
      run: |
        echo "=== Xray 运行日志片段 ==="
        tail -n 20 xray.log || true
