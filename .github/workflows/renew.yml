name: Auto Renew Game4Free Server

on:
  workflow_dispatch: # 允许在 GitHub 网页上手动点击运行 (方便测试)
  schedule:
    # 定时任务：每天 UTC 时间 00:00 运行一次 (相当于北京时间早上 8:00)
    - cron: '0 0 * * *'

jobs:
  renew_server:
    # 【重要修改】：将 ubuntu-latest 改为 ubuntu-22.04，解决 libasound2 依赖报错问题
    runs-on: ubuntu-22.04

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # 安装 Playwright 对应的浏览器内核及其系统依赖
        playwright install chromium
        playwright install-deps chromium

    - name: 执行续期脚本
      env:
        # 注入你在图中配置的变量 SOCKS5_PROXY
        SOCKS5_PROXY: ${{ secrets.SOCKS5_PROXY }}
      run: |
        python renew.py

    - name: 上传错误截图 (如果运行失败)
      uses: actions/upload-artifact@v4
      if: failure() # 只有失败时才执行此步，用于排查是否被卡在图片验证码
      with:
        name: error-screenshot
        path: error_screenshot.png
        retention-days: 3
