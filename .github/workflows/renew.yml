name: Auto Renew Game4Free Server

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  renew_server:
    runs-on: ubuntu-22.04

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 🛠️ 安装系统底层依赖 (虚拟显示器与解压工具)
      run: |
        sudo apt-get update -q
        sudo apt-get install -y xvfb p7zip-full

    - name: 📥 从谷歌插件商店拉取 Buster 插件
      run: |
        # 直接通过 Chrome 官方接口拉取 Buster 最新版 crx 文件
        wget -q "https://clients2.google.com/service/update2/crx?response=redirect&os=win&arch=x86-64&os_arch=x86-64&nacl_arch=x86-64&prod=chromecrx&prodchannel=&prodversion=114.0.5735.199&lang=en-US&acceptformat=crx2,crx3&x=id%3Dmpbjkejclgfgadiemmefgebjfooflfhl%26installsource%3Dondemand%26uc" -O buster.crx
        # 使用 7z 强制解压 crx 文件包
        7z x buster.crx -obuster_ext > /dev/null
        # 移除会导致加载失败的签名文件夹
        rm -rf buster_ext/_metadata
        echo "✅ Buster 插件下载并解压成功！"

    - name: 设置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 🐍 安装 Python 依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 🔧 安装 ChromeDriver 驱动
      run: seleniumbase install chromedriver

    - name: 🚀 执行续期脚本
      env:
        SOCKS5_PROXY: ${{ secrets.SOCKS5_PROXY }}
      run: |
        xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python renew.py

    - name: 📸 上传运行截图
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: run-screenshots
        path: "*.png"
        retention-days: 3
